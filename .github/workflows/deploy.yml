name: Deploy

# ── 트리거 ────────────────────────────────────────────────────────────────────
# main 에 머지(push)될 때만 배포. 신뢰할 수 없는 코드가 배포 파이프라인·홈서버에
# 닿지 않도록 pull_request 트리거는 의도적으로 넣지 않는다.
on:
  push:
    branches: [main]
  workflow_dispatch:

# ── 최소 권한 ────────────────────────────────────────────────────────────────
# 기본 권한은 read 로 최소화하고, GHCR 이미지 push 에 필요한 packages:write 만 추가.
permissions:
  contents: read
  packages: write

# ── 중첩 배포 방지 ────────────────────────────────────────────────────────────
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── ① 빌드 & 테스트 & 이미지 push ─────────────────────────────────────────
  build:
    # 방어 가드: main ref·원본 저장소일 때만 실행 (다른 브랜치/PR/fork 차단)
    if: >-
      github.ref == 'refs/heads/main' &&
      github.repository == 'Kyunglock/fusion-game'
    # 네이티브 arm64 러너 (홈서버가 Apple Silicon). QEMU 에뮬레이션은 Node 빌드
    # 중 SIGILL 로 죽으므로 arm64 러너에서 네이티브로 빌드한다. (공개 레포 무료)
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 20
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      # 빌드·테스트를 이미지 빌드 전에 먼저 돌려 실패를 빨리 잡는다.
      - name: Install & build & test
        run: |
          npm ci
          npm run build:css
          npm test --if-present

      # GHCR 이미지 이름은 소문자만 허용 → 저장소명을 소문자로 변환
      - name: Compute image name
        id: meta
        run: echo "image=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # 배포 대상이 Apple Silicon 하나뿐이므로 arm64 단일 플랫폼으로 빌드
          platforms: linux/arm64
          # 커밋 SHA 로 불변 태그 + 편의를 위한 latest 태그
          tags: |
            ${{ steps.meta.outputs.image }}:${{ github.sha }}
            ${{ steps.meta.outputs.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── ② 홈서버로 배포 (Tailscale VPN 경유 SSH) ──────────────────────────────
  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Environment 보호 규칙(필수 리뷰어 등)으로 홈서버 배포 직전 승인 게이트를 걸 수 있다.
    environment: production
    timeout-minutes: 15
    steps:
      # 러너를 tailnet 에 임시(ephemeral) 노드로 연결. OAuth 클라이언트로 인증하며
      # job 이 끝나면 자동으로 tailnet 에서 사라진다.
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      # tailnet 내부에서만 홈서버 SSH 에 접속 → 공인 IP 에 SSH 포트 노출 0.
      # 네이티브 ssh 사용: ssh-keyscan 으로 모든 타입의 호스트키를 known_hosts 에
      # 넣어, 서버가 어떤 키(ecdsa/ed25519/rsa)를 협상하든 검증되게 한다.
      # (tailnet 이 이미 상호인증·암호화를 제공하므로 이 검증은 심층방어 계층)
      - name: Deploy over SSH (tailnet)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # 모든 호스트키 타입 등록 (협상 타입 불일치로 인한 검증 실패 방지)
          ssh-keyscan -T 15 "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # 홈서버(macOS)에서 실행할 배포 스크립트를 stdin(heredoc)으로 전달.
          # GHCR 자격증명은 명령줄 인자(VAR=val)로 넘겨 원격 sh 에 주입한다.
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=yes \
            "$SSH_USER@$SSH_HOST" \
            GHCR_USER="$GHCR_USER" GHCR_TOKEN="$GHCR_TOKEN" IMAGE_TAG="$IMAGE_TAG" 'sh -s' <<'REMOTE'
          set -eu
          # 비대화형 SSH 셸엔 /usr/local/bin(Docker Desktop) 이 PATH 에 없다.
          export PATH="/usr/local/bin:$PATH"
          # 아래 임시 DOCKER_CONFIG 를 쓰면 desktop-linux 컨텍스트가 빠지므로
          # 데몬 소켓을 직접 지정한다(/var/run/docker.sock → Docker Desktop 소켓 심링크).
          export DOCKER_HOST="unix:///var/run/docker.sock"
          # Docker Desktop 은 credsStore 가 비어도 비대화형 SSH 세션에서 macOS 키체인
          # 헬퍼를 호출해 docker login 이 실패한다(-25308). 그래서 login 을 쓰지 않고
          # GHCR auth 를 임시 config.json 에 직접 기록해 키체인을 완전히 우회한다.
          # (GITHUB_TOKEN 은 워크플로우 수명뿐. compose 플러그인은 심링크로 유지)
          DC="$(mktemp -d)"
          ln -s "$HOME/.docker/cli-plugins" "$DC/cli-plugins"
          AUTH=$(printf '%s:%s' "$GHCR_USER" "$GHCR_TOKEN" | base64 | tr -d '\n')
          printf '{"auths":{"ghcr.io":{"auth":"%s"}}}' "$AUTH" > "$DC/config.json"
          export DOCKER_CONFIG="$DC"
          cd /Users/kynugroak/srv/fusion-game
          docker compose pull
          docker compose up -d
          docker image prune -f
          rm -rf "$DC"
          REMOTE
