# 홈서버(/srv/fusion-game)에 두는 배포용 compose 파일.
# CI 가 SSH 로 접속해 `docker compose pull && docker compose up -d` 를 실행한다.
#
# 구성: Cloudflare ──▶ nginx(8443 TLS) ──▶ app(4000)  (같은 docker 네트워크)
services:
  # ── 앱: GHCR 이미지 ─────────────────────────────────────────────────────────
  app:
    # IMAGE_TAG 는 배포 시 CI 가 커밋 SHA 로 주입한다. 수동 실행 시엔 latest.
    image: ghcr.io/kyunglock/fusion-game:${IMAGE_TAG:-latest}
    container_name: fusion-game
    restart: unless-stopped
    networks: [web]

    # SESSION_SECRET, PORT 등은 홈서버의 /srv/fusion-game/.env 에서 읽는다.
    # (.env 는 서버에만 두고 저장소·이미지에는 절대 넣지 않는다)
    env_file:
      - .env

    # 외부 노출은 아래 nginx 가 담당한다. 여기 바인딩은 호스트 로컬 디버깅용(선택).
    # nginx 는 docker 네트워크에서 컨테이너 이름 `fusion-game:4000` 으로 직접 접근한다.
    ports:
      - "127.0.0.1:4000:4000"

    # 간단한 헬스체크 (앱 루트에 TCP/HTTP 응답 확인)
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:4000/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── 리버스 프록시: TLS 종단 + WebSocket 업그레이드 ──────────────────────────
  nginx:
    image: nginx:alpine
    container_name: fusion-nginx
    restart: unless-stopped
    networks: [web]

    # Cloudflare(SSL Full)가 origin:8443(HTTPS)로 붙는다. 공유기에서 8443 포워딩
    # 하거나 cloudflared 터널을 쓰면 이 publish 는 로컬(127.0.0.1)로 좁혀도 된다.
    ports:
      - "8443:8443"

    volumes:
      # nginx.conf 는 conf.d 로 마운트돼 http{} 컨텍스트에 include 된다 (map 사용).
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro

    # 앱이 healthy 해진 뒤 프록시를 붙인다 (기동 순서만 보장; 이후 재시작엔 무관).
    depends_on:
      app:
        condition: service_healthy

# 두 컨테이너가 서비스명으로 서로를 찾도록 명시적 네트워크 사용.
networks:
  web:
    driver: bridge
