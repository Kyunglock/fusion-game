<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>파티 게임즈</title>
  <script>
    try { var t = localStorage.getItem('pg-theme'); if (t && t !== 'green') document.documentElement.dataset.theme = t; } catch (e) {}
  </script>
  <link rel="stylesheet" href="/css/index.css" />
</head>
<body>

<!-- ══════════════════════════════════════
     PAGE 1: 닉네임 입력
══════════════════════════════════════ -->
<div id="page-auth" class="page active">
  <div class="site-logo">🎮 파티 게임즈</div>
  <div class="site-tagline">친구들과 함께하는 실시간 파티 게임</div>

  <div class="card">
    <!-- 신규 사용자 → 닉네임 입력 -->
    <div id="new-user-form">
      <label for="input-username">닉네임 <span style="color:#456355;font-weight:400">(2~16자, 게임에 표시됩니다)</span></label>
      <input type="text" id="input-username" placeholder="사용할 닉네임" maxlength="16" autocomplete="off" />
    </div>

    <button class="btn btn-primary" id="btn-start">시작하기 →</button>
    <p class="auth-note" id="auth-note">닉네임은 이 브라우저 세션에 저장됩니다</p>
  </div>
</div>

<!-- ══════════════════════════════════════
     PAGE 2: GAME SELECTION
══════════════════════════════════════ -->
<div id="page-select" class="page">
  <div class="site-logo">🎮 파티 게임즈</div>
  <div class="site-tagline">게임을 선택하세요</div>

  <!-- User bar -->
  <div class="user-bar">
    <div class="avatar" id="user-avatar">😊</div>
    <div class="nick-info">
      <span class="nick" id="display-nick">-</span>
    </div>
    <button class="btn-edit-profile" id="btn-edit-profile">프로필 설정</button>
  </div>

  <p class="section-label">게임 목록</p>

  <div class="game-grid">
    <a class="game-card" href="/crocodile">
      <span class="badge badge-new">NEW</span>
      <div class="game-icon">🐊</div>
      <div class="game-name">악어 이빨 뽑기</div>
      <div class="game-desc">함정 이빨을 피하며<br>살아남아라!</div>
      <div class="room-count" id="room-count-croc"></div>
    </a>

    <a class="game-card" href="/bomb">
      <span class="badge badge-new">NEW</span>
      <div class="game-icon">💣</div>
      <div class="game-name">폭탄 돌리기</div>
      <div class="game-desc">폭발 전에<br>얼른 넘겨라!</div>
      <div class="room-count" id="room-count-bomb"></div>
    </a>

    <a class="game-card" href="/tetris">
      <span class="badge badge-new">NEW</span>
      <div class="game-icon">🧱</div>
      <div class="game-name">테트리스 배틀</div>
      <div class="game-desc">줄을 지우면 상대에게<br>쓰레기 줄이 쌓인다!</div>
      <div class="room-count" id="room-count-tetris"></div>
    </a>

    <a class="game-card" href="/jamo">
      <span class="badge badge-new">NEW</span>
      <div class="game-icon">🔤</div>
      <div class="game-name">자모 워들</div>
      <div class="game-desc">숨겨진 낱말을<br>자모로 맞혀보세요!</div>
      <div class="room-count" id="room-count-jamo"></div>
    </a>
  </div>
</div>

<!-- Profile edit modal -->
<div id="profile-modal" class="modal-overlay">
  <div class="modal-card">
    <h3 class="modal-title">프로필 설정</h3>

    <div class="avatar-preview-wrap">
      <div class="avatar-preview" id="avatar-preview">😊</div>
    </div>

    <label class="avatar-upload-label" for="avatar-file-input">
      📁 아바타 이미지 선택
      <input type="file" id="avatar-file-input" accept="image/*" />
    </label>
    <p class="avatar-hint">128×128px로 자동 리사이즈됩니다</p>

    <label for="input-new-username" style="margin-top:16px;">닉네임 변경 <span class="label-hint">(2~16자)</span></label>
    <input type="text" id="input-new-username" maxlength="16" autocomplete="off" />

    <button class="btn btn-primary" id="btn-save-profile" disabled>저장</button>
    <button class="btn btn-secondary" id="btn-cancel-profile">취소</button>
  </div>
</div>

<div id="error-toast"></div>

<script type="module" src="/js/index.js"></script>
<script type="module" src="/js/online-widget.js"></script>
<script type="module" src="/js/shared/themeManager.js"></script>
</body>
</html>
