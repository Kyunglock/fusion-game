# fusion-game 리버스 프록시 (nginx 컨테이너용)
# conf.d/*.conf 는 nginx http{} 컨텍스트 안에 include 되므로 map 사용 가능
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 8443 ssl;
    server_name _;

    # Cloudflare SSL 모드 Full: origin:8443 에도 HTTPS로 접속하므로 TLS 필요
    # Full(strict가 아닌) 모드는 origin 인증서 유효성을 검증하지 않아 self-signed로 충분
    ssl_certificate     /etc/nginx/certs/origin.crt;
    ssl_certificate_key /etc/nginx/certs/origin.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Cloudflare가 8443(HTTPS)로 받아 origin:8443(HTTPS)로 넘긴다
    location / {
        proxy_pass http://fusion-game:4000;   # 같은 docker 네트워크의 컨테이너 이름

        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;      # Socket.IO WebSocket 업그레이드
        proxy_set_header Connection         $connection_upgrade;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_read_timeout  3600s;   # WebSocket 장시간 연결 유지
        proxy_send_timeout  3600s;
    }
}
