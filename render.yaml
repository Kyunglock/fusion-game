# Render Blueprint — https://render.com/docs/blueprint-spec
# 대시보드에서 New + → Blueprint 로 이 저장소를 연결하면 자동 배포됩니다.
services:
  - type: web
    name: fusion-game
    runtime: node
    plan: free
    # 배포 시 SCSS → CSS 컴파일 (client/css/는 gitignore되어 있음)
    buildCommand: npm install && npm run build:css
    startCommand: node server.js
    envVars:
      # 세션 서명 키 — Render가 랜덤 값을 자동 생성
      - key: SESSION_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "20"
